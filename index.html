<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vite + Tailwind</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-blue-600 mb-6">Tailwind CSS Test</h1>
    
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <h2 class="text-2xl font-semibold text-gray-800 mb-4">Welcome to Tailwind CSS</h2>
      <p class="text-gray-600 mb-4">This is a test page to verify that Tailwind CSS is working properly.</p>
      
      <div class="space-y-4">
        <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
          Primary Button
        </button>
        
        <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition-colors">
          Success Button
        </button>
        
        <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition-colors">
          Danger Button
        </button>
      </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">Card 1</h3>
        <p class="text-gray-600">This is the first card with some sample content.</p>
      </div>
      
      <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">Card 2</h3>
        <p class="text-gray-600">This is the second card with some sample content.</p>
      </div>
      
      <div class="bg-white rounded-lg shadow-md p-6">
        <h3 class="text-xl font-semibold text-gray-800 mb-2">Card 3</h3>
        <p class="text-gray-600">This is the third card with some sample content.</p>
      </div>
    </div>
  </div>
</body>
</html>
